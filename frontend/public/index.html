<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a1815" />
    <meta name="description" content="DripSole - Premium footwear collection for the modern lifestyle. Discover luxury shoes that define sophistication." />
    <meta name="keywords" content="shoes, footwear, premium shoes, luxury sneakers, DripSole, fashion" />
    <meta name="author" content="DripSole" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dripsole.com/" />
    <meta property="og:title" content="DripSole - Premium Footwear Collection" />
    <meta property="og:description" content="Where luxury meets comfort - discover footwear that defines sophistication" />
    <meta property="og:image" content="%PUBLIC_URL%/dripsole-og.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://dripsole.com/" />
    <meta property="twitter:title" content="DripSole - Premium Footwear Collection" />
    <meta property="twitter:description" content="Where luxury meets comfort - discover footwear that defines sophistication" />
    <meta property="twitter:image" content="%PUBLIC_URL%/dripsole-og.jpg" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- Google Fonts for better typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Favicon and theme -->
    <style>
      /* Loading screen styles */
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(ellipse 100% 80% at 50% -30%, rgba(201, 168, 124, 0.1), transparent 55%), linear-gradient(165deg, #131210 0%, #1a1815 45%, #161412 100%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-logo {
        font-size: 4rem;
        font-weight: 800;
        background: linear-gradient(45deg, #d4b896, #a68963);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 30px;
        font-family: 'Playfair Display', serif;
        letter-spacing: 3px;
        animation: pulse 2s ease-in-out infinite;
      }
      
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(212, 175, 55, 0.3);
        border-radius: 50%;
        border-top-color: #c9a87c;
        animation: spin 1s ease-in-out infinite;
      }
      
      .loading-text {
        color: #f8fafc;
        font-size: 1.1rem;
        margin-top: 20px;
        font-weight: 300;
        letter-spacing: 1px;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
      
      /* Hide scrollbar during loading */
      body.loading {
        overflow: hidden;
      }
    </style>
    
    <title>DripSole - Premium Footwear Collection</title>
  </head>
  <body class="ds-theme">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    
    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="loading-logo">DripSole</div>
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading your perfect collection...</div>
    </div>
    
    <!-- Main App Container -->
    <div id="root"></div>
    
    <script>
      // Remove loading screen when React app loads
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingScreen = document.getElementById('loading-screen');
          const body = document.body;
          
          if (loadingScreen) {
            loadingScreen.classList.add('fade-out');
            body.classList.remove('loading');
            
            setTimeout(function() {
              loadingScreen.style.display = 'none';
            }, 500);
          }
        }, 1000); // Show loading for at least 1 second
      });
      
      // Add loading class to body initially
      document.body.classList.add('loading');
    </script>
  </body>
</html>
